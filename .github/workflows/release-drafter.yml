name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7
        id: drafter

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cargo-edit

      - name: Bump version
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: cargo set-version "$VERSION"

      - name: Commit changes
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: |
          if ! git diff --quiet Cargo.toml Cargo.lock; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            git commit -m "Bump version to ${VERSION} [skip ci]"
            git push
          fi
