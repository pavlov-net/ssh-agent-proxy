name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        id: drafter

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-edit

      - name: Bump version
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: cargo set-version "$VERSION"

      - name: Commit changes
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: |
          if ! git diff --quiet Cargo.toml Cargo.lock; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            git commit -m "Bump version to ${VERSION} [skip ci]"
            git push
          fi
